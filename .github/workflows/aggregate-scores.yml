name: Aggregate Scores

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Aggregate votes and update scores
        run: python3 .github/scripts/aggregate.py

      - name: Archive low-quality entries
        run: python3 .github/scripts/archive.py

      - name: Commit changes
        run: |
          git config user.name "RadioHeader Bot"
          git config user.email "bot@radioheader.dev"
          git add scores.json pool/ archive/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly score aggregation ($(date +%Y-%m-%d))"
            git push
          fi
